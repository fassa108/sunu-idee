<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sunu-idées</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
    
</head>
<body class="bg-light">

  
    <nav class="navbar navbar-dark bg-warning shadow-sm">
        <div class="container">
        <span class="navbar-brand fw-bold fs-4">
            Sunu-Idées
        </span>
        <span class="badge bg-dark fs-6" id="compteur">0 idée(s)</span>
        </div>
    </nav>

    
    <div class="bg-warning bg-opacity-10 border-bottom">
        <div class="container py-3">
        <p class="text-muted mb-0">
            <i class="bi bi-people-fill me-1"></i>
            Tableau blanc collaboratif et anonyme de la <strong>Promo P9</strong> · Simplon
        </p>
        </div>
    </div>


    <main class="container py-4 justify-content-between">
        <div class="row">
                <div class="col-8">

                </div>
                <div class="col-4">
                    <button class="btn btn-warning text-dark" id="btn-ajout">
                        <span>Ajouter un idee</span>
                    </button>
                </div>
            </div>
        <div class="row">
            

            <div class="col-lg-4 " id="modal-ajout" tabindex="-1">
                <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                <div class="card-header bg-warning text-dark fw-semibold">
                    <i class="bi bi-pencil-fill me-2"></i>Soumettre une idée
                </div>
                <div class="card-body">

                    <div class="mb-3">
                    <label for="titre" class="form-label fw-semibold">Titre <span class="text-danger">*</span></label>
                    <input type="text" id="titre" class="form-control" placeholder="Ex : Organiser un hackathon…" maxlength="100"/>
                    </div>

                    <div class="mb-3">
                    <label for="categorie" class="form-label fw-semibold">Catégorie <span class="text-danger">*</span></label>
                    <select id="categorie" class="form-select">
                        <option value="" disabled selected>-- Choisir --</option>
                        <option value="Pédagogie"> Pédagogie</option>
                        <option value="Événement">Événement</option>
                        <option value="Vie de campus">Vie de campus</option>
                        <option value="Amélioration technique"> Amélioration technique</option>
                    </select>
                    </div>

                    <div class="mb-3">
                    <label for="description" class="form-label fw-semibold">Description <span class="text-danger">*</span></label>
                    <textarea id="description"class="form-control" rows="4" placeholder="Décrivez votre idée…" maxlength="400"></textarea>
                    </div>

                    <div class="d-flex gap-2">
                        <button id="btn-soumettre" class="btn btn-warning fw-bold flex-grow-1">
                            <i class="bi bi-send-fill me-1"></i> Publier
                        </button>
                        <button id="btn-reset" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i>
                        </button>
                    </div>
                    <p id="message-form" class="mt-2 mb-0 small" aria-live="polite"></p>

                </div>
                </div>
        </div>

        
        <div class="col-lg-8">
            <h2 class="h5 fw-bold mb-3">
            <i class="bi bi-kanban-fill me-2 text-warning"></i>Mur des idées
            </h2>

            
            <div id="message-vide" class="alert alert-warning text-center">
            <i class="bi bi-lightbulb me-1"></i>
            Aucune idée pour l'instant. Soyez le premier à en soumettre une ! 
            </div>

            
            <div id="mur" class="row g-3"></div>
        </div>

        </div>
    </main>

    
    <div class="modal fade" id="modalEditer" tabindex="-1" aria-labelledby="modalEditerLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">

            <div class="modal-header bg-warning">
            <h5 class="modal-title fw-bold" id="modalEditerLabel">
                <i class="bi bi-pencil-square me-2"></i>Modifier l'idée
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
            </div>

            <div class="modal-body">

            <div class="mb-3">
                <label for="edit-titre" class="form-label fw-semibold">Titre</label>
                <input type="text" id="edit-titre" class="form-control" maxlength="80" />
            </div>

            <div class="mb-3">
                <label for="edit-categorie" class="form-label fw-semibold">Catégorie</label>
                <select id="edit-categorie" class="form-select">
                <option value="Pédagogie">Pédagogie</option>
                <option value="Événement">Événement</option>
                <option value="Vie de campus">Vie de campus</option>
                <option value="Amélioration technique">Amélioration technique</option>
                </select>
            </div>

            <div class="mb-3">
                <label for="edit-description" class="form-label fw-semibold">Description</label>
                <textarea id="edit-description" class="form-control" rows="4" maxlength="400"></textarea>
            </div>

            </div>

            <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annuler</button>
            <button type="button" id="btn-sauvegarder" class="btn btn-warning fw-bold">
                <i class="bi bi-save-fill me-1"></i> Sauvegarder
            </button>
            </div>

        </div>
        </div>
    </div>


    <footer class="text-center text-muted py-4 border-top mt-4 small mb-0">
        Sunu-Idées · Promo P9 · Simplon — Anonyme & Collaboratif
    </footer>

 
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
